version: "3.8"

services:
  vueprom:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./vueprom.json:/app/vueprom.json:ro
    ports:
      - "8080:8080"
    restart: unless-stopped

  goveeprom:
    build:
      context: .
      dockerfile: Dockerfile.govee
    volumes:
      - ./govee.json:/app/govee.json:ro
    ports:
      - "8081:8081"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.2.1
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    depends_on:
      - vueprom
      - goveeprom

  grafana:
    image: grafana/grafana:11.5.2
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD not set}
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
