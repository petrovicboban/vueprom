global:
  scrape_interval: 60s
  evaluation_interval: 60s

scrape_configs:
  - job_name: vueprom
    static_configs:
      - targets:
          - vueprom:8080

  - job_name: goveeprom
    static_configs:
      - targets:
          - goveeprom:8081

  - job_name: airthingsprom
    static_configs:
      - targets:
          - airthingsprom:8082

  - job_name: ecobeeprom
    static_configs:
      - targets:
          - ecobeeprom:8083
